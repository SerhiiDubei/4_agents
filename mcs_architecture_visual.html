<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCS — Architecture Layers</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#060b18;color:#c9d4e8;font-family:'Inter','Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column}

header{height:52px;padding:0 18px;background:#07101f;border-bottom:1px solid #141f35;display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo h1{font-size:13px;font-weight:700;color:#fff;white-space:nowrap}
.logo h1 em{font-style:normal;color:#4f9eff}
.logo p{font-size:9px;color:#2a3e5a;margin-top:1px}
.tabs{display:flex;gap:4px}
.tab{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1px solid #1a2d4a;background:transparent;color:#4a6a8a;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .18s;white-space:nowrap}
.tab:hover{color:#8ab8d8;border-color:#2a4d7a}
.tab .tn{font-size:9px;opacity:.55;margin-right:2px}
.tab.l1{--ac:#4f9eff}.tab.l2{--ac:#a78bfa}.tab.l3{--ac:#fbbf24}.tab.l4{--ac:#34d399}
.tab.active{border-color:var(--ac);color:var(--ac);background:rgba(255,255,255,.04)}
.vtgl{margin-left:auto;display:flex;background:#0d1a2d;border:1px solid #1a2d4a;border-radius:6px;overflow:hidden}
.vtgl button{padding:5px 12px;background:transparent;border:none;color:#4a6a8a;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit;transition:all .15s}
.vtgl button.active{background:#1a2d4a;color:#c9d4e8}

.lhdr{padding:7px 18px 6px;border-bottom:1px solid #0d1a2d;flex-shrink:0}
.lhdr h2{font-size:12px;font-weight:700;color:#fff}
.lhdr .ds{font-size:9.5px;color:#3a5a7a;margin-top:2px;line-height:1.4}
.lhdr .ds.tech{font-family:'Courier New',monospace;font-size:9px;color:#2a4a6a}
.hidden{display:none!important}

main{flex:1;position:relative;overflow:hidden;min-height:0;display:flex;flex-direction:column}
.layer{position:absolute;inset:0;display:none;flex-direction:column}
.layer.active{display:flex}

.diagram-area{flex:1;position:relative;overflow:hidden}
.diagram-inner{position:relative;height:100%}
.scrollable-x{overflow-x:auto;overflow-y:hidden}
.scrollable-x .diagram-inner{min-height:320px}

.zone-band{position:absolute;left:0;right:0;pointer-events:none}
.zone-lbl{position:absolute;font-size:8px;font-family:monospace;font-weight:700;pointer-events:none;padding:4px 10px;letter-spacing:.5px}

.node{position:absolute;transform:translate(-50%,-50%);border-radius:8px;padding:8px 13px;cursor:pointer;text-align:center;transition:box-shadow .15s;z-index:2;min-width:88px;max-width:152px;border-style:solid;user-select:none}
.node:hover{filter:brightness(1.15);z-index:10}
.node.selected{outline:1.5px solid rgba(255,255,255,.25);outline-offset:3px;z-index:10}
.node.decision{border-radius:4px;border-style:dashed}
.nd-step{font-size:8px;color:#2a3e5a;margin-bottom:3px;font-family:monospace;letter-spacing:.5px}
.nd-title{font-size:11px;font-weight:700;white-space:nowrap}
.nd-sub{font-size:8px;color:#4a6a8a;margin-top:3px;line-height:1.3}
.nd-sub2{font-size:7px;color:#2a3a5a;margin-top:2px;line-height:1.3}

.edges-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:1}

/* ── SIDE PANEL ── */
.side-panel{position:absolute;top:0;right:0;bottom:0;width:360px;background:rgba(6,11,24,.97);border-left:1px solid #141f35;transform:translateX(100%);transition:transform .22s;overflow-y:auto;z-index:30;display:flex;flex-direction:column}
.side-panel.open{transform:translateX(0)}
.sp-head{padding:14px 16px 10px;border-bottom:1px solid #0d1a2d;flex-shrink:0;display:flex;align-items:flex-start;gap:10px}
.sp-emoji{font-size:26px;line-height:1;flex-shrink:0;margin-top:2px}
.sp-titles{flex:1;min-width:0}
.sp-title{font-size:14px;font-weight:700;color:#fff}
.sp-tagline{font-size:10px;color:#4a6a8a;margin-top:3px;line-height:1.4}
.sp-close{background:none;border:none;color:#2a3e5a;cursor:pointer;font-size:18px;padding:0;flex-shrink:0;line-height:1;margin-top:2px}
.sp-close:hover{color:#c9d4e8}
.sp-body{padding:0 0 20px;flex:1}
.sp-section{padding:12px 16px;border-bottom:1px solid #0a1628}
.sp-section:last-child{border-bottom:none}
.sp-sec-title{font-size:9px;font-weight:700;letter-spacing:.8px;color:#2a4a6a;text-transform:uppercase;margin-bottom:6px}
.sp-text{font-size:10.5px;color:#8ab8d8;line-height:1.65}
.sp-tech{font-family:'Courier New',monospace;font-size:9px;color:#4a7aaa;line-height:1.6;background:#040810;padding:8px 10px;border-radius:5px;margin-top:6px}
.sp-flow{display:flex;flex-direction:column;gap:6px}
.sp-flow-row{display:flex;align-items:flex-start;gap:8px;font-size:10px;line-height:1.5}
.sp-flow-arrow{color:#2a4a6a;flex-shrink:0;font-size:12px;margin-top:1px}
.sp-flow-content{color:#8ab8d8}
.sp-chain{background:#040d1a;border:1px solid #0d1a2d;border-radius:6px;padding:10px 12px;font-size:9px;font-family:'Courier New',monospace;color:#4a7aaa;line-height:1.7;margin-top:6px;word-break:break-word}
.sp-why{font-size:9.5px;color:#5a7a5a;line-height:1.6;font-style:italic}
.sp-drills{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.sp-drill-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:6px;border:1px solid #1a2d4a;background:#040d1a;cursor:pointer;font-family:inherit;transition:all .18s;text-align:left}
.sp-drill-btn:hover{border-color:var(--dc);background:#070f1e}
.sp-drill-btn .db-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--dc);color:#060b18;white-space:nowrap}
.sp-drill-btn .db-label{font-size:10px;color:#8ab8d8;flex:1}
.sp-drill-btn .db-arrow{font-size:12px;color:#2a4a6a}
.node.has-drill .nd-badge{display:inline-block;font-size:7px;font-weight:700;background:#a78bfa22;color:#a78bfaaa;border:1px solid #a78bfa33;border-radius:3px;padding:1px 5px;margin-top:4px;letter-spacing:.4px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>MCS · <em>Multi-Consciousness System</em></h1>
    <p>Interactive architecture · 4 layers · click nodes for details &nbsp;·&nbsp; <span style="color:#4dbb80;font-weight:700;">CODE READY</span> — Level1 math tick active, Level2 LLM daemon ready · ініціалізується в Island через <em>game_engine.py</em></p>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab l1 active" data-layer="1"><span class="tn">L1</span>System</button>
    <button class="tab l2" data-layer="2"><span class="tn">L2</span>Parliament</button>
    <button class="tab l3" data-layer="3"><span class="tn">L3</span>Desires</button>
    <button class="tab l4" data-layer="4"><span class="tn">L4</span>Tick</button>
  </nav>
  <div class="vtgl">
    <button class="active" data-mode="simple">Simple</button>
    <button data-mode="tech">Tech</button>
  </div>
</header>

<main id="main"></main>

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
var currentLayer = 1;
var viewMode = 'simple';
var particles = [];
var panelNodeId = null;

// ══════════════════════════════════════════════════
//  BUILD DOM
// ══════════════════════════════════════════════════
function el(tag, cls, id) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (id) e.id = id;
  return e;
}

function buildLayers() {
  var main = document.getElementById('main');
  for (var n = 1; n <= 4; n++) {
    var def = LAYERS[n];
    var section = el('section', 'layer' + (n === 1 ? ' active' : ''), 'layer-' + n);

    // header
    var lhdr = el('div', 'lhdr');
    var h2 = el('h2'); h2.textContent = def.title;
    var dsSm = el('p', 'ds simple'); dsSm.textContent = def.ds_simple;
    var dsTe = el('p', 'ds tech hidden'); dsTe.textContent = def.ds_tech;
    lhdr.appendChild(h2); lhdr.appendChild(dsSm); lhdr.appendChild(dsTe);
    section.appendChild(lhdr);

    // diagram area
    var area = el('div', 'diagram-area' + (def.scrollX ? ' scrollable-x' : ''), 'area-' + n);

    // inner container (fixed px width for scrollable, 100% otherwise)
    var inner = el('div', 'diagram-inner', 'inner-' + n);
    if (def.scrollX) {
      inner.style.width = def.scrollW + 'px';
      inner.style.minHeight = '100%';
    } else {
      inner.style.width = '100%';
    }

    // zone bands
    if (def.zoneBands) {
      def.zoneBands.forEach(function(z) {
        var band = el('div', 'zone-band');
        band.style.top = z.top + '%';
        band.style.height = z.h + '%';
        band.style.background = z.bg;
        inner.appendChild(band);
        var lbl = el('div', 'zone-lbl');
        lbl.style.top = z.top + '%';
        lbl.style.left = z.lx || '1%';
        lbl.style.color = z.lc;
        lbl.textContent = z.lbl;
        inner.appendChild(lbl);
      });
    }

    // nodes
    def.nodes.forEach(function(nd) {
      var div = el('div', 'node' + (nd.decision ? ' decision' : ''));
      div.dataset.id = nd.id;
      div.dataset.layer = n;
      // position
      if (def.scrollX) {
        div.style.left = nd.px + 'px';
      } else {
        div.style.left = nd.x + '%';
      }
      div.style.top = nd.y + '%';
      div.style.background = nd.bg || '#0d1a2d';
      div.style.borderColor = nd.c;
      div.style.borderWidth = (nd.bw || 1.5) + 'px';
      if (nd.bw >= 2) div.style.boxShadow = '0 0 20px ' + nd.c + '1a';

      if (nd.step) {
        var step = el('div', 'nd-step'); step.textContent = nd.step;
        div.appendChild(step);
      }
      var title = el('div', 'nd-title'); title.style.color = nd.c; title.textContent = nd.title;
      div.appendChild(title);
      if (nd.sub) { var sub = el('div', 'nd-sub'); sub.textContent = nd.sub; div.appendChild(sub); }
      if (nd.sub2) { var sub2 = el('div', 'nd-sub2'); sub2.textContent = nd.sub2; div.appendChild(sub2); }
      if (nd.hasDrill) {
        div.classList.add('has-drill');
        var badge = el('div', 'nd-badge'); badge.textContent = '◎ розкрити';
        div.appendChild(badge);
      }

      div.addEventListener('click', function(e) {
        e.stopPropagation();
        document.querySelectorAll('.node.selected').forEach(function(x) { x.classList.remove('selected'); });
        div.classList.add('selected');
        openPanel(nd.id);
      });
      inner.appendChild(div);
    });

    // SVG for edges
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('edges-layer');
    svg.id = 'svg-' + n;
    if (def.scrollX) {
      svg.style.width = def.scrollW + 'px';
    }
    inner.appendChild(svg);

    // side panel (per layer)
    var panel = el('div', 'side-panel', 'panel-' + n);
    // head
    var spHead = el('div', 'sp-head', 'sp-head-' + n);
    var spEmoji = el('div', 'sp-emoji', 'sp-emoji-' + n); spEmoji.textContent = '●';
    var spTitles = el('div', 'sp-titles');
    var spTitle = el('div', 'sp-title', 'sp-title-' + n);
    var spTagline = el('div', 'sp-tagline', 'sp-tagline-' + n);
    var spClose = el('button', 'sp-close'); spClose.textContent = '×';
    spClose.addEventListener('click', function() { closePanel(n); });
    spTitles.appendChild(spTitle); spTitles.appendChild(spTagline);
    spHead.appendChild(spEmoji); spHead.appendChild(spTitles); spHead.appendChild(spClose);
    panel.appendChild(spHead);
    var spBody = el('div', 'sp-body', 'sp-body-' + n);
    panel.appendChild(spBody);
    area.appendChild(panel);

    area.appendChild(inner);
    section.appendChild(area);
    main.appendChild(section);
  }
}

// ══════════════════════════════════════════════════
//  SIDE PANEL
// ══════════════════════════════════════════════════
function openPanel(nodeId) {
  var info = NI[nodeId];
  if (!info) return;
  panelNodeId = nodeId;
  var panel = document.getElementById('panel-' + currentLayer);
  if (!panel) return;

  document.getElementById('sp-emoji-' + currentLayer).textContent = info.emoji || '●';
  document.getElementById('sp-title-' + currentLayer).textContent = info.title;
  document.getElementById('sp-tagline-' + currentLayer).textContent = info.tagline || '';

  var body = document.getElementById('sp-body-' + currentLayer);
  while (body.firstChild) body.removeChild(body.firstChild);

  function section(title, content, isTech, isChain, isWhy) {
    var sec = el('div', 'sp-section');
    var st = el('div', 'sp-sec-title'); st.textContent = title; sec.appendChild(st);
    var txt = el('div', isWhy ? 'sp-why' : (isTech ? 'sp-tech' : (isChain ? 'sp-chain' : 'sp-text')));
    txt.textContent = content;
    sec.appendChild(txt);
    body.appendChild(sec);
  }

  function flowSection() {
    var sec = el('div', 'sp-section');
    var st = el('div', 'sp-sec-title'); st.textContent = 'ПОТІК ДАНИХ'; sec.appendChild(st);
    var flow = el('div', 'sp-flow');
    if (info.from) {
      var r1 = el('div', 'sp-flow-row');
      var a1 = el('div', 'sp-flow-arrow'); a1.textContent = '←';
      var c1 = el('div', 'sp-flow-content'); c1.textContent = 'від: ' + info.from;
      r1.appendChild(a1); r1.appendChild(c1); flow.appendChild(r1);
    }
    if (info.to) {
      var r2 = el('div', 'sp-flow-row');
      var a2 = el('div', 'sp-flow-arrow'); a2.textContent = '→';
      var c2 = el('div', 'sp-flow-content'); c2.textContent = 'до: ' + info.to;
      r2.appendChild(a2); r2.appendChild(c2); flow.appendChild(r2);
    }
    sec.appendChild(flow);
    body.appendChild(sec);
  }

  var mainText = viewMode === 'simple' ? info.analogy : info.tech;
  var subText = viewMode === 'simple' ? info.story : info.analogy;

  section(viewMode === 'simple' ? '🎯 АНАЛОГІЯ' : '⚙ ТЕХНІЧНО', mainText, viewMode === 'tech');
  section('📖 ЩО ВІДБУВАЄТЬСЯ', subText);
  flowSection();
  if (info.chain) section('🔗 ЛАНЦЮГ ВИКЛИКУ', info.chain, false, true);

  if (info.drillLinks && info.drillLinks.length) {
    var dSec = el('div', 'sp-section');
    var dTitle = el('div', 'sp-sec-title'); dTitle.textContent = '🔍 РОЗКРИТИ ПІДШАРИ';
    dSec.appendChild(dTitle);
    var dList = el('div', 'sp-drills');
    info.drillLinks.forEach(function(dl) {
      var btn = el('button', 'sp-drill-btn');
      btn.style.setProperty('--dc', dl.dc);
      var badge = el('span', 'db-badge'); badge.textContent = dl.badge; badge.style.background = dl.dc;
      var lbl = el('span', 'db-label'); lbl.textContent = dl.lbl;
      var arrow = el('span', 'db-arrow'); arrow.textContent = '→';
      btn.appendChild(badge); btn.appendChild(lbl); btn.appendChild(arrow);
      btn.addEventListener('click', function() { switchLayer(dl.n); });
      dList.appendChild(btn);
    });
    dSec.appendChild(dList);
    body.appendChild(dSec);
  }

  panel.classList.add('open');
}

function closePanel(n) {
  var panel = document.getElementById('panel-' + (n || currentLayer));
  if (panel) panel.classList.remove('open');
  document.querySelectorAll('.node.selected').forEach(function(x) { x.classList.remove('selected'); });
  panelNodeId = null;
}

// ══════════════════════════════════════════════════
//  EDGE DRAWING WITH D3
// ══════════════════════════════════════════════════
function getRect(nodeId, layerNum) {
  var inner = document.getElementById('inner-' + layerNum);
  if (!inner) return null;
  var el = inner.querySelector('[data-id="' + nodeId + '"]');
  if (!el) return null;
  var ir = inner.getBoundingClientRect();
  var nr = el.getBoundingClientRect();
  return {
    l: nr.left - ir.left, r: nr.right - ir.left,
    t: nr.top - ir.top,   b: nr.bottom - ir.top,
    cx: nr.left + nr.width/2 - ir.left,
    cy: nr.top + nr.height/2 - ir.top
  };
}

function connPts(f, t) {
  var dx = t.cx - f.cx, dy = t.cy - f.cy;
  if (Math.abs(dx) >= Math.abs(dy)) {
    return dx > 0
      ? {s:{x:f.r, y:f.cy}, e:{x:t.l, y:t.cy}}
      : {s:{x:f.l, y:f.cy}, e:{x:t.r, y:t.cy}};
  }
  return dy > 0
    ? {s:{x:f.cx, y:f.b}, e:{x:t.cx, y:t.t}}
    : {s:{x:f.cx, y:f.t}, e:{x:t.cx, y:t.b}};
}

function curve(s, e) {
  var dx = e.x-s.x, dy = e.y-s.y;
  if (Math.abs(dx) >= Math.abs(dy)) {
    var cx = Math.abs(dx)*.44, sg = dx>0?1:-1;
    return 'M'+s.x+' '+s.y+' C'+(s.x+sg*cx)+' '+s.y+','+(e.x-sg*cx)+' '+e.y+','+e.x+' '+e.y;
  }
  var cy = Math.abs(dy)*.44, sy = dy>0?1:-1;
  return 'M'+s.x+' '+s.y+' C'+s.x+' '+(s.y+sy*cy)+','+e.x+' '+(e.y-sy*cy)+','+e.x+' '+e.y;
}

function stopParticles(n) {
  particles.forEach(function(p) { if (p.layer === n) p.stop = true; });
  particles = particles.filter(function(p) { return p.layer !== n; });
}

function drawEdges(n) {
  var def = LAYERS[n];
  var inner = document.getElementById('inner-' + n);
  var svgEl = document.getElementById('svg-' + n);
  if (!inner || !svgEl) return;

  stopParticles(n);
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

  var svg = d3.select(svgEl);
  svg.append('defs').append('marker')
    .attr('id','arr'+n).attr('markerWidth',8).attr('markerHeight',6)
    .attr('refX',7).attr('refY',3).attr('orient','auto')
    .append('path').attr('d','M0,0 L8,3 L0,6 z').attr('fill','#8ab8d866');

  def.edges.forEach(function(edge, i) {
    var fr = getRect(edge.from, n);
    var tr = getRect(edge.to, n);
    if (!fr || !tr) return;
    var pts = connPts(fr, tr);
    var d = curve(pts.s, pts.e);
    var pid = 'p'+n+'_'+i;

    var path = svg.append('path')
      .attr('id', pid).attr('d', d).attr('fill','none')
      .attr('stroke', edge.c||'#4f9eff55')
      .attr('stroke-width', edge.thick ? 2 : 1.5)
      .attr('stroke-dasharray', edge.dashed ? '6,4' : null)
      .attr('marker-end', 'url(#arr'+n+')');

    if (edge.lbl) {
      var pn = path.node(), pl = pn.getTotalLength();
      var mp = pn.getPointAtLength(pl * .45);
      var p1 = pn.getPointAtLength(pl * .42), p2 = pn.getPointAtLength(pl * .48);
      var ang = Math.atan2(p2.y-p1.y, p2.x-p1.x);
      svg.append('text')
        .attr('x', mp.x - Math.sin(ang)*10)
        .attr('y', mp.y - 9)
        .attr('fill', edge.c||'#4f9eff55')
        .attr('font-size','8').attr('font-family','system-ui,sans-serif')
        .attr('text-anchor','middle').attr('opacity',.8)
        .text(edge.lbl);
    }

    if (edge.anim) {
      var dot = svg.append('circle').attr('r', edge.thick?3.5:2.5)
        .attr('fill', edge.c||'#4f9effaa').attr('opacity',0);
      var p = {layer:n, stop:false};
      particles.push(p);
      var delay = i*260 + Math.random()*400;
      (function(pp, dd, pidx) {
        function run() {
          if (pp.stop) return;
          var pe = document.getElementById(pidx);
          if (!pe) return;
          var len = pe.getTotalLength();
          dd.attr('opacity',.85);
          dd.interrupt();
          dd.transition().duration(1700+Math.random()*600).ease(d3.easeLinear)
            .attrTween('transform', function() {
              return function(t) {
                var pt = pe.getPointAtLength(t*len);
                return 'translate('+pt.x+','+pt.y+')';
              };
            })
            .on('end', function() {
              if (pp.stop) return;
              dd.attr('opacity',0);
              setTimeout(run, 350+Math.random()*700);
            });
        }
        setTimeout(run, delay);
      })(p, dot, pid);
    }
  });
}

// ══════════════════════════════════════════════════
//  SWITCH LAYER (programmatic)
// ══════════════════════════════════════════════════
function switchLayer(n) {
  if (n === currentLayer) return;
  closePanel(currentLayer);
  stopParticles(currentLayer);
  document.querySelectorAll('.layer').forEach(function(l) { l.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('layer-'+n).classList.add('active');
  var tab = document.querySelector('.tab[data-layer="'+n+'"]');
  if (tab) tab.classList.add('active');
  currentLayer = n;
  requestAnimationFrame(function() { requestAnimationFrame(function() { drawEdges(n); }); });
}

// ══════════════════════════════════════════════════
//  LAYER TABS
// ══════════════════════════════════════════════════
document.getElementById('tabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');
  if (!tab) return;
  switchLayer(parseInt(tab.dataset.layer));
});

// ══════════════════════════════════════════════════
//  VIEW TOGGLE
// ══════════════════════════════════════════════════
document.querySelector('.vtgl').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn || btn.dataset.mode === viewMode) return;
  viewMode = btn.dataset.mode;
  document.querySelectorAll('.vtgl button').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.lhdr .ds').forEach(function(el) {
    if (el.classList.contains('simple')) el.classList.toggle('hidden', viewMode !== 'simple');
    if (el.classList.contains('tech')) el.classList.toggle('hidden', viewMode !== 'tech');
  });
  if (panelNodeId) openPanel(panelNodeId);
});
document.querySelectorAll('.lhdr .ds.tech').forEach(function(e) { e.classList.add('hidden'); });

// ══════════════════════════════════════════════════
//  CLICK OUTSIDE
// ══════════════════════════════════════════════════
document.addEventListener('click', function(e) {
  if (!e.target.closest('.node') && !e.target.closest('.side-panel')) {
    closePanel(currentLayer);
  }
});

// ══════════════════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════════════════
var resizeT;
window.addEventListener('resize', function() {
  clearTimeout(resizeT);
  resizeT = setTimeout(function() { drawEdges(currentLayer); }, 150);
});

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
buildLayers();
requestAnimationFrame(function() {
  requestAnimationFrame(function() { drawEdges(1); });
});
</script>
</body>
