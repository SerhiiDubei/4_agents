var EDGE_COLOR   = {working:'#1a5a40',broken:'#7a2020',branch:'#1a3060',planned:'#3a1a60',partial:'#4a3808'};

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render(){
  var W = window.innerWidth, H = window.innerHeight;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  var visIds = new Set(NODES.filter(function(n){ return activeFilters.has(n.status); }).map(function(n){return n.id;}));

  // Build SVG parts as array then join — avoids repeated string concat
  var parts = [];

  // Defs
  parts.push('<defs>');
  ['working','broken','branch','planned','partial'].forEach(function(t){
    var c = EDGE_COLOR[t];
    parts.push('<marker id="arr-'+t+'" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="'+c+'"/></marker>');
    var h = EDGE_HICOLOR[t];
    parts.push('<marker id="arrh-'+t+'" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="'+h+'"/></marker>');
  });
  parts.push('<filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>');
  parts.push('</defs>');

  parts.push('<g id="vp" transform="translate('+vx+','+vy+') scale('+vscale+')">');

  // Layer bands
  var bands = [
    {y:55,h:120,label:'IDENTITY \u0026 ROLES',c:'rgba(52,211,153,0.03)'},
    {y:205,h:120,label:'LOGIC LAYER',c:'rgba(96,165,250,0.03)'},
    {y:365,h:120,label:'GAME MODES',c:'rgba(251,191,36,0.03)'},
    {y:515,h:125,label:'DISCONNECTED / IN BRANCH',c:'rgba(167,139,250,0.03)'},
    {y:665,h:120,label:'INFRASTRUCTURE',c:'rgba(100,116,139,0.03)'},
  ];
  bands.forEach(function(b){
    parts.push('<rect x="40" y="'+b.y+'" width="1060" height="'+b.h+'" rx="8" fill="'+b.c+'" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>');
    parts.push('<text x="56" y="'+(b.y+16)+'" font-size="8" font-weight="700" letter-spacing="0.1em" fill="rgba(255,255,255,0.06)" font-family="Inter,system-ui">'+b.label+'</text>');
  });

  // Edges
  EDGES.forEach(function(e){
    if(!visIds.has(e.s)||!visIds.has(e.t)) return;
    var sn = NODES.find(function(n){return n.id===e.s;}), tn = NODES.find(function(n){return n.id===e.t;});
    if(!sn||!tn) return;
    var sp = nodePositions[e.s], tp = nodePositions[e.t];
    var sx = sp.x+sn.w/2, sy = sp.y+sn.h/2, tx = tp.x+tn.w/2, ty = tp.y+tn.h/2;
    var dx = tx-sx, dy = ty-sy, len = Math.sqrt(dx*dx+dy*dy)||1;
    var nx = dx/len, ny = dy/len;

    function edgePt(cx,cy,w,h,px,py){
      if(Math.abs(px*(h/2))>Math.abs(py*(w/2))){ return {x:cx+(px>0?w/2:-w/2),y:cy+(px>0?w/2:-w/2)*py/px}; }
      return {x:cx+(py>0?h/2:-h/2)*px/py,y:cy+(py>0?h/2:-h/2)};
    }
    var p1 = edgePt(sx,sy,sn.w,sn.h,nx,ny);
    var p2 = edgePt(tx,ty,tn.w,tn.h,-nx,-ny);
    var mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    var qx=mx-ny*35, qy=my+nx*35;

    var isSel = selectedNode&&(selectedNode.id===e.s||selectedNode.id===e.t);
    var col = isSel ? EDGE_HICOLOR[e.type] : EDGE_COLOR[e.type];
    var markId = isSel ? 'arrh-'+e.type : 'arr-'+e.type;
    var isDash = (e.type!=='working'&&e.type!=='partial');
    var dashAttr = isDash ? 'stroke-dasharray="6,4"' : '';
    var sw = isSel ? 2 : 1.5;
    var op = isSel ? 0.95 : 0.5;

    parts.push('<path d="M'+p1.x.toFixed(1)+','+p1.y.toFixed(1)+' Q'+qx.toFixed(1)+','+qy.toFixed(1)+' '+p2.x.toFixed(1)+','+p2.y.toFixed(1)+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" '+dashAttr+' marker-end="url(#'+markId+')" opacity="'+op+'"/>');

    if(isSel&&e.label){
      var lx=(p1.x+qx+p2.x)/3, ly=(p1.y+qy+p2.y)/3-8;
      parts.push('<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" font-size="8" fill="'+col+'" text-anchor="middle" font-family="Inter,system-ui" paint-order="stroke" stroke="#060b18" stroke-width="3">'+esc(e.label)+'</text>');
    }
  });

  // Nodes
  NODES.forEach(function(n){
    if(!visIds.has(n.id)) return;
    var p = nodePositions[n.id];
    var col = STATUS_COLOR[n.status];
    var isSel = selectedNode&&selectedNode.id===n.id;
    var bg = isSel ? 'rgba(255,255,255,0.06)' : 'rgba(7,16,31,0.88)';
    var bw = isSel ? 2 : 1.5;
    var bop = isSel ? 0.9 : 0.45;
    var filt = isSel ? ' filter="url(#glow)"' : '';
    var nc = n.issues.length, gc = n.gaps.length;

    parts.push('<g class="nd" data-id="'+n.id+'" transform="translate('+p.x.toFixed(1)+','+p.y.toFixed(1)+')" cursor="pointer"'+filt+'>');
    parts.push('<rect width="'+n.w+'" height="'+n.h+'" rx="8" fill="'+bg+'" stroke="'+col+'" stroke-width="'+bw+'" stroke-opacity="'+bop+'"/>');
    // top color strip
    parts.push('<rect width="'+n.w+'" height="3" rx="2" fill="'+col+'" opacity="0.75"/>');

    // branch badge
    if(n.status==='branch'){
      parts.push('<rect x="'+(n.w-80)+'" y="7" width="73" height="14" rx="3" fill="#0a1428" stroke="#1a3060" stroke-width="1"/>');
      parts.push('<text x="'+(n.w-44)+'" y="18" font-size="7" font-weight="700" fill="#60a5fa" text-anchor="middle" font-family="monospace">ruflo/mcs-engine</text>');
    }

    // badge indicators: red=issues, purple=gaps
    var badgeY = n.status==='branch' ? 30 : 14;
    if(nc>0){
      parts.push('<circle cx="'+(n.w-9)+'" cy="'+badgeY+'" r="8" fill="#180808" stroke="#5a1818" stroke-width="1"/>');
      parts.push('<text x="'+(n.w-9)+'" y="'+(badgeY+4)+'" font-size="8" font-weight="700" fill="#f87171" text-anchor="middle">'+nc+'</text>');
    }
    if(gc>0){
      var gx = nc>0 ? n.w-24 : n.w-9;
      parts.push('<circle cx="'+gx+'" cy="'+badgeY+'" r="8" fill="#10091a" stroke="#3a1860" stroke-width="1"/>');
      parts.push('<text x="'+gx+'" y="'+(badgeY+4)+'" font-size="8" font-weight="700" fill="#a78bfa" text-anchor="middle">'+gc+'</text>');
    }

    var nameColor = isSel ? '#ffffff' : '#d4e4f4';
    parts.push('<text x="12" y="28" font-size="12" font-weight="700" fill="'+nameColor+'" font-family="Inter,system-ui">'+esc(n.name)+'</text>');
    var shortSub = n.sub.length>30 ? n.sub.substring(0,29)+'\u2026' : n.sub;
    parts.push('<text x="12" y="44" font-size="9" fill="'+col+'" opacity="0.85" font-family="monospace">'+esc(shortSub)+'</text>');
    parts.push('<text x="12" y="60" font-size="8" fill="'+col+'" opacity="0.45" font-weight="600" font-family="Inter,system-ui">'+esc(STATUS_LABEL[n.status])+'</text>');
    parts.push('</g>');
  });

  parts.push('</g>');

  // Use a trusted SVG string built from our own static data (all escaped via esc())
  svg.innerHTML = parts.join('');

  svg.querySelectorAll('.nd').forEach(function(el){
    el.addEventListener('mousedown', onNodeMouseDown, {passive:false});
    el.addEventListener('click', onNodeClick);
  });
}

// ─── PANEL ───────────────────────────────────────────────────────────────────

function makePanelBody(node){
  var frag = document.createDocumentFragment();

  function sec(title, cb){
    var div = document.createElement('div');
    div.className = 'panel-section';
    var h3 = document.createElement('h3');
    h3.textContent = title;
    div.appendChild(h3);
    cb(div);
    frag.appendChild(div);
  }

  sec('Що це робить', function(div){
    var p = document.createElement('p');
    p.textContent = node.what;
    div.appendChild(p);
  });

  if(node.files.length){
    sec('Файли ('+node.files.length+')', function(div){
      var wrap = document.createElement('div');
      wrap.className = 'panel-files';
      node.files.forEach(function(f){
        var d = document.createElement('div');
        d.className = 'panel-file';
        d.textContent = f;
        wrap.appendChild(d);
      });
      div.appendChild(wrap);
    });
  }

  if(node.issues.length){
    sec('Проблеми ('+node.issues.length+')', function(div){
      var wrap = document.createElement('div');
      wrap.className = 'panel-issues';
      node.issues.forEach(function(issue){
        var d = document.createElement('div');
        d.className = 'panel-issue';
        var m = issue.match(/^(КРИТ-\d+|ВИС-\d+|СЕР-\d+|НИЗ-\d+|SEC-\d+|ROB-\d+):\s*/);
        if(m){
          var badge = document.createElement('span');
          badge.className = 'issue-id';
          badge.textContent = m[1];
          d.appendChild(badge);
          d.appendChild(document.createTextNode(issue.slice(m[0].length)));
        } else {
          d.textContent = issue;
        }
        wrap.appendChild(d);
      });
      div.appendChild(wrap);
    });
  }

  if(node.gaps.length){
    sec('Що потрібно додати ('+node.gaps.length+')', function(div){
      var wrap = document.createElement('div');
      wrap.className = 'panel-gaps';
      node.gaps.forEach(function(g){
        var d = document.createElement('div');
        d.className = 'panel-gap';
        d.textContent = g;
        wrap.appendChild(d);
      });
      div.appendChild(wrap);
    });
  }

  if(node.connects.length){
    sec("Зв'язки", function(div){
      var wrap = document.createElement('div');
      wrap.className = 'panel-connects';
      node.connects.forEach(function(c){
        var d = document.createElement('div');
        d.className = 'panel-conn';
        var color = '#5a8aaa';
        if(c.includes('BROKEN')) color = '#f87171';
        else if(c.includes('branch') || c.includes('БРАНЧ')) color = '#60a5fa';
        else if(c.includes('PLANNED')) color = '#a78bfa';
        d.style.color = color;
        d.textContent = c;
        wrap.appendChild(d);
      });
      div.appendChild(wrap);
    });
  }

  return frag;
}

function openPanel(node){
  selectedNode = node;
  document.getElementById('panelName').textContent = node.name;
  document.getElementById('panelSub').textContent = node.sub;
  var st = document.getElementById('panelStatus');
  st.textContent = STATUS_LABEL[node.status];
  st.className = 'panel-status s-'+node.status;
  var body = document.getElementById('panelBody');
  body.innerHTML = '';
  body.appendChild(makePanelBody(node));
  panel.classList.add('open');
  render();
}

function closePanel(){
  panel.classList.remove('open');
  selectedNode = null;
  render();
}

panelClose.addEventListener('click', closePanel);

// ─── INPUT ───────────────────────────────────────────────────────────────────

var nodeDragStart = null;
var dragNodeId = null;

function onNodeMouseDown(e){
  e.stopPropagation();
  var id = e.currentTarget.getAttribute('data-id');
  var p = nodePositions[id];
  nodeDragStart = {id:id, mx:e.clientX, my:e.clientY, ox:p.x, oy:p.y};
  dragNodeId = id;
  window.addEventListener('mousemove', onNodeMove);
  window.addEventListener('mouseup', onNodeUp);
}

function onNodeMove(e){
  if(!nodeDragStart) return;
  var dx = (e.clientX - nodeDragStart.mx)/vscale;
  var dy = (e.clientY - nodeDragStart.my)/vscale;
  nodePositions[nodeDragStart.id] = {x: nodeDragStart.ox+dx, y: nodeDragStart.oy+dy};
  render();
}

function onNodeUp(e){
  var moved = Math.abs(e.clientX-nodeDragStart.mx)>4||Math.abs(e.clientY-nodeDragStart.my)>4;
  if(!moved){/* click handled by onClick */}
  nodeDragStart = null;
  dragNodeId = null;
  window.removeEventListener('mousemove', onNodeMove);
  window.removeEventListener('mouseup', onNodeUp);
}

function onNodeClick(e){
  e.stopPropagation();
  var id = e.currentTarget.getAttribute('data-id');
  var node = NODES.find(function(n){return n.id===id;});
  if(!node) return;
  if(selectedNode&&selectedNode.id===id){ closePanel(); return; }
  openPanel(node);
}

svg.addEventListener('mousedown', function(e){
  if(dragNodeId) return;
  panStart = {mx:e.clientX, my:e.clientY, vx:vx, vy:vy};
  dragging = true;
});
window.addEventListener('mousemove', function(e){
  if(!dragging||!panStart||dragNodeId) return;
  vx = panStart.vx+(e.clientX-panStart.mx);
  vy = panStart.vy+(e.clientY-panStart.my);
  render();
});
window.addEventListener('mouseup', function(){
  dragging = false;
  panStart = null;
});
svg.addEventListener('click', function(e){
  if(e.target===svg) closePanel();
});
svg.addEventListener('wheel', function(e){
  e.preventDefault();
  var rect = svg.getBoundingClientRect();
  var mx = e.clientX-rect.left, my = e.clientY-rect.top;
  var delta = e.deltaY>0 ? 0.88 : 1.12;
  var ns = Math.max(0.25, Math.min(2.5, vscale*delta));
  vx = mx-(mx-vx)*(ns/vscale);
  vy = my-(my-vy)*(ns/vscale);
  vscale = ns;
  render();
},{passive:false});

document.querySelectorAll('.filter-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var f = btn.getAttribute('data-filter');
    if(activeFilters.has(f)){ activeFilters.delete(f); btn.classList.remove('active'); }
    else{ activeFilters.add(f); btn.classList.add('active'); }
    render();
  });
});

window.addEventListener('resize', render);

// Center on load
(function center(){
  var W = window.innerWidth, H = window.innerHeight;
  vscale = Math.min((W-340)/1080, (H-80)/800, 1);
  vx = Math.max(20, (W - 1080*vscale)/2);
  vy = 60;
  render();
})();
</script>
</body>
</html>
